<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Little Secret Quiz 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    
    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 420px;
      margin: 8px;
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(255, 105, 180, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      text-align: center;
      padding: 18px 15px;
      position: relative;
      flex-shrink: 0;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .hearts {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 26px;
      animation: float 3s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .progress-bar {
      height: 6px;
      background: #ff69b4;
      transition: width 0.4s ease;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px 15px;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    .question-container {
      flex: 1;
      animation: fadeInUp 0.5s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 22px;
      line-height: 1.35;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 11px;
      flex: 1;
    }

    .option {
      background: #fff0f5;
      border: 2px solid #ffb6c1;
      border-radius: 18px;
      padding: 15px 17px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      line-height: 1.45;
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
    }

    .option:nth-child(1) { animation-delay: 0.1s; }
    .option:nth-child(2) { animation-delay: 0.2s; }
    .option:nth-child(3) { animation-delay: 0.3s; }
    .option:nth-child(4) { animation-delay: 0.4s; }

    .option:hover, .option:active {
      background: #ffe4e9;
      border-color: #ff69b4;
      transform: scale(1.03);
    }

    .option.selected {
      background: #ff69b4;
      color: white;
      border-color: #ff1493;
    }

    button {
      margin: 18px auto 12px;
      padding: 15px 40px;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 17.5px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
      display: block;
      width: 90%;
      max-width: 280px;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Result Screen */
    .result h2 {
      text-align: center;
      color: #ff1493;
      margin-bottom: 8px;
      animation: fadeInUp 0.6s ease;
    }

    .score {
      font-size: 42px;
      font-weight: 700;
      color: #ff1493;
      text-align: center;
      margin: 8px 0 18px;
      animation: fadeInUp 0.7s ease;
    }

    .instruction {
      margin: 20px 0;
      padding: 18px;
      background: #fff0f5;
      border-radius: 20px;
      font-size: 15.5px;
      color: #ff1493;
      border: 2px solid #ffb6c1;
      line-height: 1.5;
      animation: fadeInUp 0.8s ease;
    }

    #answers-summary p {
      margin: 14px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #ffe4e9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="hearts">💖💕</div>
      <h1>Our Little Secret Quiz 💕</h1>
    </div>
    <div class="progress-bar" id="progress"></div>

    <div class="content" id="quiz">
      <div class="question-container" id="question-container">
        <div class="question" id="question-text"></div>
        <div class="options" id="options"></div>
      </div>
      <button id="next-btn" disabled>Next →</button>
    </div>

    <div class="content result" id="result" style="display: none;">
      <h2>Quiz Complete! 🎉</h2>
      <p class="score" id="score-text"></p>
      
      <div id="answers-summary"></div>

      <div class="instruction">
        📸 <strong>Please screenshot this whole page</strong> and send it to Sagar 💌<br><br>
        He’s waiting to see your answers! ✨
      </div>

      <button onclick="copyResults()">Copy Text Instead</button>
    </div>
  </div>

  <script>
    const questions = [
      { q: "What’s your favorite thing about hanging out with me?", options: ["The deep conversations we have", "How we always end up laughing so much", "The comfortable silence and vibes", "All of the above – it’s always fun"] },
      { q: "If we had a whole free day together, what would you want to do?", options: ["Go on a long drive or explore a new place", "Chill at home/cafe and talk about everything", "Watch movies or play games", "Anything, as long as it’s with you"] },
      { q: "What do you like most about my personality?", options: ["How smart and thoughtful you are", "Your kindness and the way you make me feel special", "Your sense of humor and positive energy", "A mix of everything – you’re genuinely great"] },
      { q: "How do you feel when we’re texting or talking?", options: ["I smile every time I see your message", "It’s nice and comforting", "I look forward to it", "It always makes my day better"] },
      { q: "What’s one thing you wish we could do more often together?", options: ["Go on more adventures", "Have more long talks", "Just spend chill time together", "All of the above – I enjoy our time"] }
    ];

    let currentQuestion = 0;
    let answers = [];
    let selectedIndex = -1;

    const progress = document.getElementById('progress');
    const questionText = document.getElementById('question-text');
    const optionsDiv = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const quizDiv = document.getElementById('quiz');
    const resultDiv = document.getElementById('result');
    const questionContainer = document.getElementById('question-container');

    function loadQuestion() {
      questionContainer.style.opacity = 0;
      
      setTimeout(() => {
        questionText.textContent = questions[currentQuestion].q;
        optionsDiv.innerHTML = '';

        questions[currentQuestion].options.forEach((opt, index) => {
          const div = document.createElement('div');
          div.className = 'option';
          div.textContent = opt;
          div.onclick = () => selectOption(index, div);
          optionsDiv.appendChild(div);
        });

        questionContainer.style.opacity = 1;
        nextBtn.disabled = true;
        selectedIndex = -1;
        updateProgress();
      }, 300);
    }

    function selectOption(index, element) {
      document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      selectedIndex = index;
      nextBtn.disabled = false;
    }

    function updateProgress() {
      const percent = ((currentQuestion + 1) / questions.length) * 100;
      progress.style.width = percent + '%';
    }

    nextBtn.addEventListener('click', () => {
      answers[currentQuestion] = selectedIndex;
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        showResults();
      }
    });

    function showResults() {
      quizDiv.style.display = 'none';
      resultDiv.style.display = 'block';
      
      let score = answers.length * 25;
      document.getElementById('score-text').textContent = score + "/100 💖";

      const summary = document.getElementById('answers-summary');
      summary.innerHTML = '<h3 style="color:#ff69b4; margin: 20px 0 15px;">Your Answers:</h3>';

      questions.forEach((q, i) => {
        const ans = answers[i] !== undefined ? q.options[answers[i]] : "Not answered";
        summary.innerHTML += `<p><strong>Q${i+1}:</strong> ${q.q}<br><strong style="color:#ff1493">→ ${ans}</strong></p>`;
      });
    }

    function copyResults() {
      let text = "💕 Our Little Secret Quiz Results 💕\n\n";
      questions.forEach((q, i) => {
        const ans = answers[i] !== undefined ? q.options[answers[i]] : "Not answered";
        text += `Q${i+1}: ${q.q}\nAnswer: ${ans}\n\n`;
      });
      text += `Score: ${answers.length * 25}/100\n\nSend this to Sagar 💌`;

      navigator.clipboard.writeText(text).then(() => alert("✅ Copied! Send to Sagar 💕"));
    }

    loadQuestion();
  </script>
</body>
</html>
