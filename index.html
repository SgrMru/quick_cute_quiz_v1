<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Little Secret Quiz 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      background: white;
      max-width: 420px;
      width: 90%;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3);
      overflow: hidden;
      position: relative;
    }

    .header {
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      text-align: center;
      padding: 25px 20px;
      position: relative;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .hearts {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      animation: float 3s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .progress-bar {
      height: 6px;
      background: #ff69b4;
      transition: width 0.4s ease;
    }

    .content {
      padding: 30px 25px;
      text-align: center;
    }

    .question {
      font-size: 22px;
      font-weight: 600;
      color: #333;
      margin-bottom: 30px;
      min-height: 80px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: #fff0f5;
      border: 2px solid #ffb6c1;
      border-radius: 20px;
      padding: 16px 20px;
      text-align: left;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .option:hover {
      background: #ffe4e9;
      border-color: #ff69b4;
      transform: scale(1.03);
    }

    .option.selected {
      background: #ff69b4;
      color: white;
      border-color: #ff1493;
    }

    button {
      margin-top: 25px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      display: none;
      padding: 30px 25px;
    }

    .score {
      font-size: 48px;
      font-weight: 700;
      color: #ff1493;
    }

    .instruction {
      margin-top: 25px;
      padding: 18px;
      background: #fff0f5;
      border-radius: 20px;
      font-size: 16px;
      color: #ff1493;
      border: 2px solid #ffb6c1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="hearts">💖💕</div>
      <h1>Our Little Secret Quiz 💕</h1>
    </div>
    <div class="progress-bar" id="progress"></div>

    <div class="content" id="quiz">
      <div class="question" id="question-text"></div>
      <div class="options" id="options"></div>
      <button id="next-btn" disabled>Next →</button>
    </div>

    <div class="result" id="result">
      <h2 style="color:#ff1493;">Quiz Complete! 🎉</h2>
      <p class="score" id="score-text"></p>
      
      <div id="answers-summary"></div>

      <div class="instruction">
        📸 <strong>Please screenshot this page</strong> and send it to Sagar 💌<br>
        He’s waiting to see your answers! ✨
      </div>

      <button onclick="copyResults()" style="margin-top: 15px;">Or Copy Text Instead</button>
    </div>
  </div>

  <script>
    const questions = [
      { 
        q: "What’s your favorite thing about hanging out with me?", 
        options: ["The deep conversations we have", "How we always end up laughing so much", "The comfortable silence and vibes", "All of the above – it’s always fun"] 
      },
      { 
        q: "If we had a whole free day together, what would you want to do?", 
        options: ["Go on a long drive or explore a new place", "Chill at home/cafe and talk about everything", "Watch movies or play games", "Anything, as long as it’s with you"] 
      },
      { 
        q: "What do you like most about my personality?", 
        options: ["How smart and thoughtful you are", "Your kindness and the way you make me feel special", "Your sense of humor and positive energy", "A mix of everything – you’re genuinely great"] 
      },
      { 
        q: "How do you feel when we’re texting or talking?", 
        options: ["I smile every time I see your message", "It’s nice and comforting", "I look forward to it", "It always makes my day better"] 
      },
      { 
        q: "What’s one thing you wish we could do more often together?", 
        options: ["Go on more adventures", "Have more long talks", "Just spend chill time together", "All of the above – I enjoy our time"] 
      }
    ];

    let currentQuestion = 0;
    let answers = [];
    let selectedIndex = -1;

    const progress = document.getElementById('progress');
    const questionText = document.getElementById('question-text');
    const optionsDiv = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const quizDiv = document.getElementById('quiz');
    const resultDiv = document.getElementById('result');

    function loadQuestion() {
      questionText.textContent = questions[currentQuestion].q;
      optionsDiv.innerHTML = '';

      questions[currentQuestion].options.forEach((opt, index) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        div.onclick = () => selectOption(index, div);
        optionsDiv.appendChild(div);
      });

      nextBtn.disabled = true;
      selectedIndex = -1;
      updateProgress();
    }

    function selectOption(index, element) {
      document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      selectedIndex = index;
      nextBtn.disabled = false;
    }

    function updateProgress() {
      const percent = ((currentQuestion) / questions.length) * 100;
      progress.style.width = percent + '%';
    }

    nextBtn.addEventListener('click', () => {
      answers[currentQuestion] = selectedIndex;
      
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        showResults();
      }
    });

    function showResults() {
      quizDiv.style.display = 'none';
      resultDiv.style.display = 'block';

      let score = answers.length * 25;
      document.getElementById('score-text').textContent = score + "/100 💖";

      const summary = document.getElementById('answers-summary');
      summary.innerHTML = '<h3 style="color:#ff69b4; margin:20px 0 10px;">Your Answers:</h3>';

      questions.forEach((q, i) => {
        const ans = answers[i] !== undefined ? q.options[answers[i]] : "Not answered";
        summary.innerHTML += `<p><strong>Q${i+1}:</strong> ${q.q}<br><strong style="color:#ff1493">→ ${ans}</strong></p>`;
      });
    }

    function copyResults() {
      let text = "💕 Our Little Secret Quiz Results 💕\n\n";
      questions.forEach((q, i) => {
        const ans = answers[i] !== undefined ? q.options[answers[i]] : "Not answered";
        text += `Q${i+1}: ${q.q}\nAnswer: ${ans}\n\n`;
      });
      text += `Score: ${answers.length * 25}/100\n\nSend this to Sagar 💌`;

      navigator.clipboard.writeText(text).then(() => {
        alert("✅ Copied! Paste and send to Sagar 💕");
      });
    }

    // Start game
    loadQuestion();
  </script>
</body>
</html>
